# build_runner configuration. Drives freezed + json_serializable codegen.
#
# JSON keys match the Dart field names verbatim (camelCase) because the
# backend's `TransformInterceptor` already speaks camelCase on the wire —
# see `docs/signup-flow.md` and `docs/flutter-integration.md` for the
# envelope shape. Earlier versions of this file forced `field_rename:
# snake`, which made every response field land as `null` on the client.

targets:
  $default:
    builders:
      json_serializable:
        options:
          # Skip generating `toJson` for sealed-union sub-types unless they
          # opt in — keeps the union discriminator field tidy.
          explicit_to_json: true
          include_if_null: false
