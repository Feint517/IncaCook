# build_runner configuration. Drives freezed + json_serializable codegen.
#
# `field_rename: snake` makes every camelCase Dart field serialize to its
# snake_case JSON form (e.g. `fullAddress` -> `full_address`). Matches the
# Postgres / Supabase column convention so the API layer is mapping-free.

targets:
  $default:
    builders:
      json_serializable:
        options:
          field_rename: snake
          # Skip generating `toJson` for sealed-union sub-types unless they
          # opt in — keeps the union discriminator field tidy.
          explicit_to_json: true
          include_if_null: false
